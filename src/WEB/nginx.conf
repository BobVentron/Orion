# ───────────────────────────────────────────────────────────────
# Bloc HTTP → redirection HTTPS
# ───────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ───────────────────────────────────────────────────────────────
# Bloc HTTPS principal
# server_name _ = catch-all : répond quelle que soit l'IP/domaine
# utilisé pour joindre le serveur (IP publique, nom de domaine…)
# ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # ── Certificats ──
    # Par défaut : cert auto-signé copié par entrypoint.sh depuis ssl-builtin/
    # Si orion-control ssl import ou ssl self-signed est lancé → cert dans /etc/orion/ssl/
    # monté via volume docker-compose → écrase le fallback à l'exécution
    ssl_certificate     /etc/nginx/ssl/orion.crt;
    ssl_certificate_key /etc/nginx/ssl/orion.key;

    # ── Paramètres TLS modernes ──
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    # ── HSTS (décommenter uniquement si le certificat est signé par une CA valide) ──
    # add_header Strict-Transport-Security "max-age=63072000" always;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ───────────────────────────────────────────────────────────────
    # Proxy API + CORS
    # ───────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }
    }

    # ── En-têtes de sécurité ──
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
